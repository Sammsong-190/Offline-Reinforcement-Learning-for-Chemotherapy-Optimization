# 训练总入口配置 (Safe CQL 实验)
# 用法: python scripts/train.py --config experiment/train_safe

agent: safe_cql
env_config: env/chemo_std
agent_config: agent/safe_cql

data:
  path: data/raw/offline_dataset.npz
  n_trajectories: 1000
  expert_ratio: 0.5
  balanced_ratio: 0.3
  aggressive_ratio: 0.1
  conservative_ratio: 0.1
  state_noise_sigma: 0.02
  expert_balance_ratio: 0.6
  expert_epsilon: 0.2

output:
  save_dir: checkpoints
  save_name: safe_cql_model.pt
